<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Princesa ❤️</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div id="loader">
        <div id="photo-stack"></div>
        <div class="loader-content">
            <h2 id="loader-status">Preparando algo especial...</h2>
            <button id="btn-entrar" style="display: none;" onclick="comenzarSorpresa()">Entrar ❤️</button>
        </div>
    </div>

    <audio id="musica" loop>
        <source src="img/musica.mp3" type="audio/mpeg">
    </audio>

    <section id="pantalla1" class="active">
        <div class="content">
            <h1 class="titulo">¿Me amas mucho?</h1>
            <div class="btn-container">
                <button class="btn-gerbera" onclick="irA('pantalla2')">SÍ</button>
                <button id="btnNo" class="btn-gerbera">NO</button>
            </div>
        </div>
    </section>

    <section id="pantalla2">
        <div class="content">
            <h1 class="titulo">¿Mucho o poquito?</h1>
            <div class="btn-container">
                <button class="btn-gerbera" onclick="irA('pantalla3')">Muchotototote</button>
                <button id="btnPoquito" class="btn-gerbera">Poquito</button>
            </div>
        </div>
    </section>

    <section id="pantalla3">
        <div class="content">
            <h1 class="titulo">¿Qué desea saber mi princesa?</h1>
            <div class="btn-main-container">
                <button class="btn-rect principal" onclick="iniciarTransicion()">3 cosas que me gustan de ti</button>
                <div class="meta-container">
                    <button class="btn-rect disabled">Mis metas contigo...</button>
                    <span class="proximamente">disponible próximamente...</span>
                </div>
            </div>
        </div>
        <div id="jardin"></div>
    </section>

    <section id="pantalla4">
        <div class="content">
            <h1 class="titulo grande sombra">¿De verdad creíste que solo serían 3 cosas?</h1>
        </div>
    </section>

    <section id="pantalla5">
        <div id="contador-flotante">0 / 100</div>
        <div class="header-mosaico">
            <h1 class="titulo">100 cosas que me encantan de ti</h1>
        </div>
        <div id="mosaico-container"></div>
    </section>

    <script src="script.js"></script>
</body>
</html>
